name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            ext: ""
          - target: x86_64-apple-darwin
            ext: ""
          - target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build binary
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          mkdir -p dist
          ASSET_NAME="pocketmcp-${TAG}-${TARGET}${EXT}"
          deno compile \
            --allow-env \
            --allow-net \
            --allow-read \
            --allow-write \
            --target "${TARGET}" \
            --output "dist/${ASSET_NAME}" \
            src/cli.ts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketmcp-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber --repo "${GH_REPO}"
          else
            gh release create "${TAG}" dist/* \
              --repo "${GH_REPO}" \
              --title "${TAG}" \
              --generate-notes
          fi
