name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os_name: linux
            ext: ""
          - target: x86_64-apple-darwin
            os_name: macos
            ext: ""
          - target: x86_64-pc-windows-msvc
            os_name: windows
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build binary
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          mkdir -p dist
          ASSET_NAME="mcp-pocketbase-admin-${TAG}-${TARGET}${EXT}"
          deno compile \
            --allow-env \
            --allow-net \
            --allow-read \
            --allow-write \
            --target "${TARGET}" \
            --output "dist/${ASSET_NAME}" \
            src/cli.ts

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
