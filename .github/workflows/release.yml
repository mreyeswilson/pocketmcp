name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: pocketmcp
            runs_on: ubuntu-latest
          - goos: darwin
            goarch: amd64
            asset_name: pocketmcp
            runs_on: ubuntu-latest
          - goos: windows
            goarch: amd64
            asset_name: pocketmcp.exe
            runs_on: ubuntu-latest
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/mreyeswilson/pocketmcp/cmd/pocketmcp.version=${VERSION} -X github.com/mreyeswilson/pocketmcp/cmd/pocketmcp.commit=${COMMIT} -X github.com/mreyeswilson/pocketmcp/cmd/pocketmcp.date=${BUILD_DATE}" \
            -o "dist/${ASSET_NAME}" \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber --repo "${GH_REPO}"
          else
            gh release create "${TAG}" dist/* \
              --repo "${GH_REPO}" \
              --title "${TAG}" \
              --generate-notes
          fi
